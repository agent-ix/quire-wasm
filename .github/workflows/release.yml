name: Release

# Publishing pipeline: runs the rust + licenses gate then publishes to public npm
# via OIDC Trusted Publishing. Wired to tag pushes only. The sibling ci.yml runs
# the same checks WITHOUT publishing on pull_request / push:main. Publishing only
# ever happens from this release.yml (which is what npm Trusted Publishing matches).

on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:

jobs:
  rust:
    name: Rust Checks
    runs-on: ubuntu-24.04
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          path: quire-wasm

      - name: Authenticate cargo git fetch (private quire-rs)
        run: git config --global url."https://x-access-token:${{ secrets.REGISTRY_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Checkout sibling spec-artifacts-iso (for parity test module)
        uses: actions/checkout@v4
        with:
          repository: agent-ix/spec-artifacts-iso
          token: ${{ secrets.REGISTRY_TOKEN }}
          path: spec-artifacts-iso

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: quire-wasm

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Format
        working-directory: quire-wasm
        run: cargo fmt --all -- --check

      - name: Lint
        working-directory: quire-wasm
        run: cargo clippy --all-targets --target wasm32-unknown-unknown -- -D warnings

      - name: Test (wasm-pack --node)
        working-directory: quire-wasm
        env:
          QUIRE_WASM_TEST_MODULE_ROOT: ${{ github.workspace }}/spec-artifacts-iso/spec_artifacts_iso
        run: wasm-pack test --node

      - name: Unsafe audit
        working-directory: quire-wasm
        run: bash scripts/check_unsafe_comments.sh

  licenses:
    name: License Check
    runs-on: ubuntu-24.04
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          path: quire-wasm
      - name: Authenticate cargo git fetch (private quire-rs)
        run: git config --global url."https://x-access-token:${{ secrets.REGISTRY_TOKEN }}@github.com/".insteadOf "https://github.com/"
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: quire-wasm
      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny
      - name: cargo deny check licenses
        working-directory: quire-wasm
        run: cargo deny check licenses

  publish:
    name: Publish to public npm (Trusted Publishing)
    # Publishes only on tag pushes; a workflow_dispatch run builds but skips publish.
    # Tokenless OIDC — needs no NPM token, just id-token: write.
    if: startsWith(github.ref, 'refs/tags/')
    needs: [rust, licenses]
    runs-on: ubuntu-24.04
    permissions:
      contents: read
      id-token: write
    env:
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
    steps:
      - uses: actions/checkout@v4
        with:
          path: quire-wasm

      - name: Authenticate cargo git fetch (private quire-rs)
        run: git config --global url."https://x-access-token:${{ secrets.REGISTRY_TOKEN }}@github.com/".insteadOf "https://github.com/"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: quire-wasm

      - name: Install wasm-pack
        uses: taiki-e/install-action@v2
        with:
          tool: wasm-pack

      - name: Build wasm package
        working-directory: quire-wasm
        run: wasm-pack build --target web --release

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"   # OIDC Trusted Publishing requires Node >= 22.14

      - name: Upgrade npm for Trusted Publishing
        run: npm install -g npm@latest

      # wasm-pack writes pkg/.gitignore ("*"), which npm honors and would exclude
      # the entire pkg/ dir from the tarball. Remove it so files:["pkg/"] ships.
      - name: Ungitignore wasm artifacts
        working-directory: quire-wasm
        run: rm -f pkg/.gitignore

      - name: Inject version from tag
        working-directory: quire-wasm
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          jq --arg v "$VERSION" '.version=$v' package.json > tmp && mv tmp package.json

      # Public npm via OIDC: route @agent-ix at registry.npmjs.org with no auth
      # token; `npm publish` performs the tokenless OIDC token exchange.
      - name: Configure npm for public npm
        # provenance=false: this repo is private, where provenance attestations
        # are unsupported; disable so OIDC publish isn't tripped up by it.
        run: printf 'registry=https://registry.npmjs.org/\n@agent-ix:registry=https://registry.npmjs.org/\nprovenance=false\n' > "$HOME/.npmrc"

      - name: Publish to public npm
        working-directory: quire-wasm
        run: npm publish
